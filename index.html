t;^1A&quot;,[&quot;Building-a-second-brain/7/2&quot;]]],536884523]],[&quot;^16&quot;,[1338,&quot;^K&quot;,[&quot;^15&quot;,[&quot;^1?&quot;,&quot;^1@&quot;]],536884493]],[&quot;^16&quot;,[1338,&quot;^H&quot;,751,536884523]],[&quot;^16&quot;,[1338,&quot;^H&quot;,1313,536884523]],[&quot;^16&quot;,[1338,&quot;^H&quot;,1341,536884523]],[&quot;^16&quot;,[1338,&quot;^19&quot;,true,536884470]],[&quot;^16&quot;,[1338,&quot;^;&quot;,&quot;~u62b96e57-2677-4955-b8bc-ea526ca2f76c&quot;,536884464]],[&quot;^16&quot;,[1341,&quot;^L&quot;,1656319627688,536884493]],[&quot;^16&quot;,[1341,&quot;^@&quot;,false,536884493]],[&quot;^16&quot;,[1341,&quot;^Z&quot;,&quot;building-a-second-brain/7/2&quot;,536884493]],[&quot;^16&quot;,[1341,&quot;^A&quot;,1313,536884493]],[&quot;^16&quot;,[1341,&quot;^12&quot;,&quot;Building-a-second-brain/7/2&quot;,536884493]],[&quot;^16&quot;,[1341,&quot;^B&quot;,1656319627688,536884493]],[&quot;^16&quot;,[1341,&quot;^;&quot;,&quot;~u62b96e8b-baa4-49c2-a2e0-0e389253fe24&quot;,536884493]],[&quot;^16&quot;,[1342,&quot;^R&quot;,&quot;==If you’re stuck on a task, break it down into smaller steps.==&quot;,536884529]],[&quot;^16&quot;,[1342,&quot;^P&quot;,&quot;^18&quot;,536884508]],[&quot;^16&quot;,[1342,&quot;^@&quot;,false,536884508]],[&quot;^16&quot;,[1342,&quot;^F&quot;,1338,536884511]],[&quot;^16&quot;,[1342,&quot;^Y&quot;,1336,536884508]],[&quot;^16&quot;,[1342,&quot;^V&quot;,1336,536884508]],[&quot;^16&quot;,[1342,&quot;^U&quot;,1336,536884529]],[&quot;^16&quot;,[1342,&quot;^?&quot;,[&quot;^ &quot;],536884529]],[&quot;^16&quot;,[1342,&quot;^19&quot;,true,536884508]],[&quot;^16&quot;,[1342,&quot;^;&quot;,&quot;~u62b96e95-e46f-47dc-8b5f-a2a9de605b7d&quot;,536884508]],[&quot;^16&quot;,[1343,&quot;^R&quot;,&quot;&gt; There are five kinds of Intermediate Packets you can create and reuse in your work:\\n* **Distilled notes**: Books or articles you’ve read and distilled so it’s ==easy to get the gist== of what they contain (using the Progressive Summarization technique you learned in the previous chapter, for example).\\n* **Outtakes**: The material or ideas that didn’t make it into a past project but could ==be used in future== ones.\\n* **Work-in-process**: The documents, graphics, agendas, or plans you produced ==during past projects==.\\n* **Final deliverables**: **Concrete pieces of work** you’ve delivered ==as part of past projects==, which could become components of something new.\\n* **Documents created by others**: Knowledge assets **created by people on your team**, contractors or consultants, or even clients or customers, that you can **reference** and incorporate into your work.\\nEg: If you’re reading how-to articles in your free time, you can save the best tips in your notes and turn them into distilled notes for when it’s time to put them to use. If you’re writing an essay and decide to cut a paragraph, you can save those outtakes in case you ever write a follow-up. If you are in product development and create a detailed set of requirements, you can save that work-in-process as a template for future products. If you’re a management consultant, you can save the slides you presented to an executive team as a final deliverable, and reuse them for similar presentations. If you’re a lab scientist and a colleague designs the perfect lab protocol, you can reuse and improve that document for your own use (with their permission, of course)&quot;,536884857]],[&quot;^16&quot;,[1343,&quot;^P&quot;,&quot;^18&quot;,536884526]],[&quot;^16&quot;,[1343,&quot;^@&quot;,false,536884526]],[&quot;^16&quot;,[1343,&quot;^F&quot;,1344,536884660]],[&quot;^16&quot;,[1343,&quot;^Y&quot;,1336,536884526]],[&quot;^16&quot;,[1343,&quot;^V&quot;,1342,536884660]],[&quot;^16&quot;,[1343,&quot;^U&quot;,1336,536884857]],[&quot;^16&quot;,[1343,&quot;^?&quot;,[&quot;^ &quot;],536884857]],[&quot;^16&quot;,[1343,&quot;^19&quot;,true,536884526]],[&quot;^16&quot;,[1343,&quot;^;&quot;,&quot;~u62b96ea1-30ad-495a-920a-95069e0c0689&quot;,536884526]],[&quot;^16&quot;,[1344,&quot;^R&quot;,&quot;&gt; Here’s what most people miss: it’s ==not enough== to _simply_ divide tasks into smaller pieces—you then need **a system for managing** those pieces.\\nThat system is your Second Brain, and the small pieces of working-in-progress it contains I call \\&quot;`Intermediate Packets`.\\&quot;&quot;,536884648]],[&quot;^16&quot;,[1344,&quot;^P&quot;,&quot;^18&quot;,536884532]],[&quot;^16&quot;,[1344,&quot;^@&quot;,false,536884532]],[&quot;^16&quot;,[1344,&quot;^F&quot;,1342,536884532]],[&quot;^16&quot;,[1344,&quot;^Y&quot;,1336,536884532]],[&quot;^16&quot;,[1344,&quot;^V&quot;,1342,536884533]],[&quot;^16&quot;,[1344,&quot;^U&quot;,1336,536884648]],[&quot;^16&quot;,[1344,&quot;^?&quot;,[&quot;^ &quot;],536884648]],[&quot;^16&quot;,[1344,&quot;^19&quot;,true,536884532]],[&quot;^16&quot;,[1344,&quot;^;&quot;,&quot;~u62b96f16-f2b6-40a4-8814-3b6ec3367456&quot;,536884532]],[&quot;^16&quot;,[1345,&quot;^R&quot;,&quot;&gt; You should always cite your sources and give credit where credit is due. A scientist doesn’t obscure her sources—she points to them so others can retrace her footsteps. ==We all stand on the shoulders of giants, and it’s smart to build on the thinking they’ve done rather than try to reinvent the wheel.==&quot;,536884742]],[&quot;^16&quot;,[1345,&quot;^P&quot;,&quot;^18&quot;,536884546]],[&quot;^16&quot;,[1345,&quot;^@&quot;,false,536884546]],[&quot;^16&quot;,[1345,&quot;^F&quot;,1346,536884657]],[&quot;^16&quot;,[1345,&quot;^Y&quot;,1336,536884546]],[&quot;^16&quot;,[1345,&quot;^V&quot;,1336,536884546]],[&quot;^16&quot;,[1345,&quot;^U&quot;,1336,536884742]],[&quot;^16&quot;,[1345,&quot;^?&quot;,[&quot;^ &quot;],536884742]],[&quot;^16&quot;,[1345,&quot;^19&quot;,true,536884546]],[&quot;^16&quot;,[1345,&quot;^;&quot;,&quot;~u62b96f2b-88f5-4533-af81-17c1d1eaa3fc&quot;,536884546]],[&quot;^16&quot;,[1346,&quot;^R&quot;,&quot;&quot;,536884657]],[&quot;^16&quot;,[1346,&quot;^P&quot;,&quot;^18&quot;,536884657]],[&quot;^16&quot;,[1346,&quot;^@&quot;,false,536884657]],[&quot;^16&quot;,[1346,&quot;^F&quot;,1342,536884660]],[&quot;^16&quot;,[1346,&quot;^Y&quot;,1336,536884657]],[&quot;^16&quot;,[1346,&quot;^V&quot;,1336,536884657]],[&quot;^16&quot;,[1346,&quot;^U&quot;,1336,536884657]],[&quot;^16&quot;,[1346,&quot;^?&quot;,[&quot;^ &quot;],536884657]],[&quot;^16&quot;,[1346,&quot;^19&quot;,true,536884657]],[&quot;^16&quot;,[1346,&quot;^;&quot;,&quot;~u62b97073-3f75-4eef-a045-2a40cf2213de&quot;,536884657]],[&quot;^16&quot;,[1347,&quot;^R&quot;,&quot;Benefits&quot;,536884764]],[&quot;^16&quot;,[1347,&quot;^P&quot;,&quot;^18&quot;,536884745]],[&quot;^16&quot;,[1347,&quot;^@&quot;,false,536884745]],[&quot;^16&quot;,[1347,&quot;^F&quot;,1345,536884745]],[&quot;^16&quot;,[1347,&quot;^Y&quot;,1336,536884745]],[&quot;^16&quot;,[1347,&quot;^V&quot;,1336,536884745]],[&quot;^16&quot;,[1347,&quot;^U&quot;,1336,536884764]],[&quot;^16&quot;,[1347,&quot;^?&quot;,[&quot;^ &quot;],536884764]],[&quot;^16&quot;,[1347,&quot;^19&quot;,true,536884745]],[&quot;^16&quot;,[1347,&quot;^;&quot;,&quot;~u62b972e3-8fa1-4f26-af83-35629c060fcd&quot;,536884745]],[&quot;^16&quot;,[1348,&quot;^N&quot;,false,536884860]],[&quot;^16&quot;,[1348,&quot;^R&quot;,&quot;First, you’ll become ==interruption-proof== because you are **focusing only on one small packet at a time**, instead of trying to load up the entire project into your mind at once. You become less vulnerable to interruptions, because you’re not trying to manage all the work-in-process in your head.&quot;,536884805]],[&quot;^16&quot;,[1348,&quot;^P&quot;,&quot;^18&quot;,536884765]],[&quot;^16&quot;,[1348,&quot;^@&quot;,false,536884765]],[&quot;^16&quot;,[1348,&quot;^F&quot;,1347,536884765]],[&quot;^16&quot;,[1348,&quot;^Y&quot;,1336,536884765]],[&quot;^16&quot;,[1348,&quot;^V&quot;,1347,536884766]],[&quot;^16&quot;,[1348,&quot;^U&quot;,1336,536884805]],[&quot;^16&quot;,[1348,&quot;^?&quot;,[&quot;^ &quot;],536884805]],[&quot;^16&quot;,[1348,&quot;^19&quot;,true,536884765]],[&quot;^16&quot;,[1348,&quot;^;&quot;,&quot;~u62b972ed-2237-425a-a3bc-698dc31b1eb9&quot;,536884765]],[&quot;^16&quot;,[1349,&quot;^N&quot;,false,536884861]],[&quot;^16&quot;,[1349,&quot;^R&quot;,&quot;Second, you’ll be able to ==make progress in any span of time==. Instead of waiting until you have multiple uninterrupted hours—which, let’s face it, is rare and getting rarer—you can look at how many minutes you have free and choose to work on an IP that you can get done within that time, even if it’s tiny. Big projects and goals become less intimidating because you can just keep breaking them down into smaller and smaller pieces, until they fit right into the gaps in your day.&quot;,536884811]],[&quot;^16&quot;,[1349,&quot;^P&quot;,&quot;^18&quot;,536884778]],[&quot;^16&quot;,[1349,&quot;^@&quot;,false,536884778]],[&quot;^16&quot;,[1349,&quot;^F&quot;,1348,536884778]],[&quot;^16&quot;,[1349,&quot;^Y&quot;,1336,536884778]],[&quot;^16&quot;,[1349,&quot;^V&quot;,1347,536884778]],[&quot;^16&quot;,[1349,&quot;^U&quot;,1336,536884811]],[&quot;^16&quot;,[1349,&quot;^?&quot;,[&quot;^ &quot;],536884811]],[&quot;^16&quot;,[1349,&quot;^19&quot;,true,536884778]],[&quot;^16&quot;,[1349,&quot;^;&quot;,&quot;~u62b972f9-0c53-4391-9a8a-00dc0edafaef&quot;,536884778]],[&quot;^16&quot;,[1350,&quot;^N&quot;,false,536884862]],[&quot;^16&quot;,[1350,&quot;^R&quot;,&quot;Third, Intermediate Packets ==increase the quality of your work== by allowing you to **collect feedback more often**. Instead of laboring for weeks in isolation, only to present your results to your boss or client and find out you went in the wrong direction, you craft just one small building block at a time and get outside input before moving forward. You’ll find that people give much better feedback if they’re included early, and the work is clearly in progress.&quot;,536884817]],[&quot;^16&quot;,[1350,&quot;^P&quot;,&quot;^18&quot;,536884781]],[&quot;^16&quot;,[1350,&quot;^@&quot;,false,536884781]],[&quot;^16&quot;,[1350,&quot;^F&quot;,1349,536884781]],[&quot;^16&quot;,[1350,&quot;^Y&quot;,1336,536884781]],[&quot;^16&quot;,[1350,&quot;^V&quot;,1347,536884781]],[&quot;^16&quot;,[1350,&quot;^U&quot;,1336,536884817]],[&quot;^16&quot;,[1350,&quot;^?&quot;,[&quot;^ &quot;],536884817]],[&quot;^16&quot;,[1350,&quot;^19&quot;,true,536884781]],[&quot;^16&quot;,[1350,&quot;^;&quot;,&quot;~u62b972fc-a02b-4149-a1cc-24b5f6fac636&quot;,536884781]],[&quot;^16&quot;,[1351,&quot;^N&quot;,false,536884863]],[&quot;^16&quot;,[1351,&quot;^R&quot;,&quot;Fourth, and best of all, eventually ==you’ll have so many IPs at your disposal== that you can execute entire projects just by assembling previously created IPs. This is a magical experience that will completely change how you view productivity. The idea of starting anything from scratch will become foreign to you—why not draw on the wealth of assets you’ve invested in in the past? People will marvel at how you’re able to deliver at such a high standard so consistently. They’ll wonder how you find the time to do so much careful thinking, when in fact you’re not working harder or longer—all you’re doing is drawing on a growing library of Intermediate Packets stored in your Second Brain. If they are truly valuable assets, then they deserve to be managed, just like any other asset you possess.&quot;,536884820]],[&quot;^16&quot;,[1351,&quot;^P&quot;,&quot;^18&quot;,536884784]],[&quot;^16&quot;,[1351,&quot;^@&quot;,false,536884784]],[&quot;^16&quot;,[1351,&quot;^F&quot;,1350,536884784]],[&quot;^16&quot;,[1351,&quot;^Y&quot;,1336,536884784]],[&quot;^16&quot;,[1351,&quot;^V&quot;,1347,536884784]],[&quot;^16&quot;,[1351,&quot;^U&quot;,1336,536884820]],[&quot;^16&quot;,[1351,&quot;^?&quot;,[&quot;^ &quot;],536884820]],[&quot;^16&quot;,[1351,&quot;^19&quot;,true,536884784]],[&quot;^16&quot;,[1351,&quot;^;&quot;,&quot;~u62b972fe-c981-4622-b01f-7c1b16249d4c&quot;,536884784]],[&quot;^16&quot;,[1353,&quot;^L&quot;,1656349898514,536884823]],[&quot;^16&quot;,[1353,&quot;^P&quot;,&quot;^18&quot;,536884823]],[&quot;^16&quot;,[1353,&quot;^O&quot;,20220628,536884823]],[&quot;^16&quot;,[1353,&quot;^@&quot;,true,536884823]],[&quot;^16&quot;,[1353,&quot;^Z&quot;,&quot;jun 28th, 2022&quot;,536884823]],[&quot;^16&quot;,[1353,&quot;^12&quot;,&quot;Jun 28th, 2022&quot;,536884823]],[&quot;^16&quot;,[1353,&quot;^B&quot;,1656349898514,536884823]],[&quot;^16&quot;,[1353,&quot;^;&quot;,&quot;~u62b9e4ca-f305-4f0b-a0b0-00b3c6b65c23&quot;,536884823]],[&quot;^16&quot;,[1354,&quot;^R&quot;,&quot;&quot;,536884824]],[&quot;^16&quot;,[1354,&quot;^P&quot;,&quot;^18&quot;,536884824]],[&quot;^16&quot;,[1354,&quot;^O&quot;,20220628,536884824]],[&quot;^16&quot;,[1354,&quot;^@&quot;,true,536884824]],[&quot;^16&quot;,[1354,&quot;^F&quot;,1353,536884824]],[&quot;^16&quot;,[1354,&quot;^Y&quot;,1353,536884824]],[&quot;^16&quot;,[1354,&quot;^V&quot;,1353,536884824]],[&quot;^16&quot;,[1354,&quot;^?&quot;,[&quot;^ &quot;],536884824]],[&quot;^16&quot;,[1354,&quot;^19&quot;,true,536884824]],[&quot;^16&quot;,[1354,&quot;^;&quot;,&quot;~u62b9e4ca-defc-41f1-8991-babe8cbf4a58&quot;,536884824]],[&quot;^16&quot;,[1355,&quot;^R&quot;,&quot;~`Intermediate Packets` are really a new _lens_ through which you can perceive the atomic units that ==make up everything you do==.&quot;,536884888]],[&quot;^16&quot;,[1355,&quot;^P&quot;,&quot;^18&quot;,536884866]],[&quot;^16&quot;,[1355,&quot;^@&quot;,false,536884866]],[&quot;^16&quot;,[1355,&quot;^F&quot;,1347,536884866]],[&quot;^16&quot;,[1355,&quot;^Y&quot;,1336,536884866]],[&quot;^16&quot;,[1355,&quot;^V&quot;,1336,536884866]],[&quot;^16&quot;,[1355,&quot;^U&quot;,1336,536884888]],[&quot;^16&quot;,[1355,&quot;^?&quot;,[&quot;^ &quot;],536884888]],[&quot;^16&quot;,[1355,&quot;^19&quot;,true,536884866]],[&quot;^16&quot;,[1355,&quot;^;&quot;,&quot;~u62ba5ba6-29fb-4939-90f5-4a3f87bcee8c&quot;,536884866]],[&quot;^16&quot;,[1356,&quot;^R&quot;,&quot;&quot;,536884891]],[&quot;^16&quot;,[1356,&quot;^P&quot;,&quot;^18&quot;,536884891]],[&q ,[&quot;^16&quot;,[1413,&quot;^;&quot;,&quot;~u62ba6b86-0b9e-4631-b6f5-5dc726dbb4b4&quot;,536885853]],[&quot;^16&quot;,[1414,&quot;^R&quot;,&quot;If you **don’t know exactly** what you’re looking for, **don’t have** a preexisting folder to look through, or are interested in images or graphics, it’s time to turn to [[Browsing]].&quot;,536885921]],[&quot;^16&quot;,[1414,&quot;^P&quot;,&quot;^18&quot;,536885891]],[&quot;^16&quot;,[1414,&quot;^@&quot;,false,536885891]],[&quot;^16&quot;,[1414,&quot;^F&quot;,1413,536885891]],[&quot;^16&quot;,[1414,&quot;^Y&quot;,1403,536885891]],[&quot;^16&quot;,[1414,&quot;^V&quot;,1412,536885891]],[&quot;^16&quot;,[1414,&quot;^U&quot;,1403,536885921]],[&quot;^16&quot;,[1414,&quot;^U&quot;,1404,536885921]],[&quot;^16&quot;,[1414,&quot;^?&quot;,[&quot;^ &quot;],536885921]],[&quot;^16&quot;,[1414,&quot;^H&quot;,1404,536885921]],[&quot;^16&quot;,[1414,&quot;^19&quot;,true,536885891]],[&quot;^16&quot;,[1414,&quot;^;&quot;,&quot;~u62ba6bc8-63f7-4e0c-bbf6-0ee8d85c31bd&quot;,536885891]],[&quot;^16&quot;,[1415,&quot;^R&quot;,&quot;&quot;,536885909]],[&quot;^16&quot;,[1415,&quot;^P&quot;,&quot;^18&quot;,536885909]],[&quot;^16&quot;,[1415,&quot;^@&quot;,false,536885909]],[&quot;^16&quot;,[1415,&quot;^F&quot;,1411,536885909]],[&quot;^16&quot;,[1415,&quot;^Y&quot;,1403,536885909]],[&quot;^16&quot;,[1415,&quot;^V&quot;,1403,536885909]],[&quot;^16&quot;,[1415,&quot;^?&quot;,[&quot;^ &quot;],536885909]],[&quot;^16&quot;,[1415,&quot;^19&quot;,true,536885909]],[&quot;^16&quot;,[1415,&quot;^;&quot;,&quot;~u62ba6be3-b661-4092-b9d5-d726ff34f894&quot;,536885909]],[&quot;^16&quot;,[1416,&quot;^R&quot;,&quot;&gt; Browsing allows us to gradually home in on the information we are looking for, starting with the **general** and ==getting more and more specific==.\\n\\n&gt; There are a variety of features offered by **notes apps** that make it easy to **browse your hierarchy of folders**. Some apps allow you to “**sort**” a list of notes by different _criteria_, such as date created. This gives you an interactive timeline of your ideas from newest to oldest. Other apps allow you to show only images and web clippings, enabling rapid visual scanning to see if anything catches your eye. Most notes apps allow you to **open multiple windows** and **compare** their contents side by side so you can look for _patterns_ and _move content_ between them.&quot;,536885983]],[&quot;^16&quot;,[1416,&quot;^P&quot;,&quot;^18&quot;,536885926]],[&quot;^16&quot;,[1416,&quot;^@&quot;,false,536885926]],[&quot;^16&quot;,[1416,&quot;^F&quot;,1422,536886025]],[&quot;^16&quot;,[1416,&quot;^Y&quot;,1404,536885926]],[&quot;^16&quot;,[1416,&quot;^V&quot;,1404,536885926]],[&quot;^16&quot;,[1416,&quot;^U&quot;,1404,536885983]],[&quot;^16&quot;,[1416,&quot;^?&quot;,[&quot;^ &quot;],536885983]],[&quot;^16&quot;,[1416,&quot;^19&quot;,true,536885926]],[&quot;^16&quot;,[1416,&quot;^;&quot;,&quot;~u62ba6bfe-be86-406c-80a3-bd421f3eba1c&quot;,536885926]],[&quot;^16&quot;,[1418,&quot;^R&quot;,&quot;&gt; Once again, there are ==limitations== to what you can find by browsing folders.\\nSometimes you know a project is coming and can start saving things to a project folder in advance, but **sometimes you don’t.** Sometimes it’s very clear which area of your business a note is related to, but often you have **no idea** _where to put it._ Many notes end up being useful in completely unexpected ways. We want to encourage that kind of serendipity, not fight it!\\nIt is for the unforeseen and the unexpected that [[Tags]] really shine.&quot;,536886011]],[&quot;^16&quot;,[1418,&quot;^P&quot;,&quot;^18&quot;,536885977]],[&quot;^16&quot;,[1418,&quot;^@&quot;,false,536885977]],[&quot;^16&quot;,[1418,&quot;^F&quot;,1416,536885977]],[&quot;^16&quot;,[1418,&quot;^Y&quot;,1404,536885977]],[&quot;^16&quot;,[1418,&quot;^V&quot;,1404,536885977]],[&quot;^16&quot;,[1418,&quot;^U&quot;,1404,536886011]],[&quot;^16&quot;,[1418,&quot;^U&quot;,1405,536886011]],[&quot;^16&quot;,[1418,&quot;^?& a47d21&quot;,536886015]],[&quot;^16&quot;,[1422,&quot;^R&quot;,&quot;title:: Browsing\\ntags:: #Building-A-Second-Brain #Retrieval-Methods&quot;,536888154]],[&quot;^16&quot;,[1422,&quot;^P&quot;,&quot;^18&quot;,536886025]],[&quot;^16&quot;,[1422,&quot;^@&quot;,false,536886025]],[&quot;^16&quot;,[1422,&quot;^F&quot;,1404,536886025]],[&quot;^16&quot;,[1422,&quot;^Y&quot;,1404,536886025]],[&quot;^16&quot;,[1422,&quot;^V&quot;,1404,536886025]],[&quot;^16&quot;,[1422,&quot;^U&quot;,751,536886032]],[&quot;^16&quot;,[1422,&quot;^U&quot;,1404,536886032]],[&quot;^16&quot;,[1422,&quot;^U&quot;,1410,536886032]],[&quot;^16&quot;,[1422,&quot;^:&quot;,true,536886032]],[&quot;^16&quot;,[1422,&quot;^?&quot;,[&quot;^ &quot;,&quot;^1?&quot;,&quot;Browsing&quot;,&quot;^1@&quot;,[&quot;^1A&quot;,[&quot;Building-A-Second-Brain&quot;,&quot;Retrieval-Methods&quot;]]],536888154]],[&quot;^16&quot;,[1422,&quot;^K&quot;,[&quot;^15&quot;,[&quot;^1?&quot;,&quot;^1@&quot;]],536886028]],[&quot;^16&quot;,[1422,&quot;^H&quot;,751,536886032]],[&quot;^16&quot;,[1422,&quot;^H&quot;,1410,536886032]],[&quot;^16&quot;,[1422,&quot;^19&quot;,true,536886025]],[&quot;^16&quot;,[1422,&quot;^;&quot;,&quot;~u62ba6fbd-bfef-4f30-a73d-212c2a0fce5b&quot;,536886025]],[&quot;^16&quot;,[1423,&quot;^R&quot;,&quot;&gt; **Tags** are like _small labels_ you can apply to certain notes **regardless of where they are located**.&quot;,536886048]],[&quot;^16&quot;,[1423,&quot;^P&quot;,&quot;^18&quot;,536886036]],[&quot;^16&quot;,[1423,&quot;^@&quot;,false,536886036]],[&quot;^16&quot;,[1423,&quot;^F&quot;,1420,536886036]],[&quot;^16&quot;,[1423,&quot;^Y&quot;,1405,536886036]],[&quot;^16&quot;,[1423,&quot;^V&quot;,1405,536886036]],[&quot;^16&quot;,[1423,&quot;^U&quot;,1405,536886048]],[&quot;^16&quot;,[1423,&quot;^?&quot;,[&quot;^ &quot;],536886048]],[&quot;^16&quot;,[1423,&quot;^19&quot;,true,536886036]],[&quot;^16&quot;,[1423,&quot;^;&quot;,&quot;~u62ba6fda-0b5e-4eb1-bcf8-e297c53f85c8&quot;,536886036]],[&quot;^16&quot;,[1424,&quot;^R&quot;,&quot;&gt; The main weakness of folders is that ideas can get ==siloed== from each other, making it **hard to spark** interesting connections. Tags can overcome this limitation by infusing your Second Brain with connections, making it easier to see ==cross-disciplinary== themes and patterns that defy simple categorization&quot;,536886069]],[&quot;^16&quot;,[1424,&quot;^P&quot;,&quot;^18&quot;,536886051]],[&quot;^16&quot;,[1424,&quot;^@&quot;,false,536886051]],[&quot;^16&quot;,[1424,&quot;^F&quot;,1423,536886051]],[&quot;^16&quot;,[1424,&quot;^Y&quot;,1405,536886051]],[&quot;^16&quot;,[1424,&quot;^V&quot;,1405,536886051]],[&quot;^16&quot;,[1424,&quot;^U&quot;,1405,536886069]],[&quot;^16&quot;,[1424,&quot;^?&quot;,[&quot;^ &quot;],536886069]],[&quot;^16&quot;,[1424,&quot;^19&quot;,true,536886051]],[&quot;^16&quot;,[1424,&quot;^;&quot;,&quot;~u62ba70a9-bad3-4a2a-888b-bb9c15753097&quot;,536886051]],[&quot;^16&quot;,[1425,&quot;^R&quot;,&quot;&gt; For example, maybe you work in customer service and notice that the same questions from customers **keep coming up again and again**. You might decide to write a _Frequently Asked Questions_ page and add it to your company website. That is a project, but not one that you previously recognized and started gathering materials for. You might have various notes that you want to draw on to design this page, but don’t want to move them from the project, area, and resource folders where they’re currently located.\\n&gt; Solution: You could take fifteen minutes and perform a series of searches for terms relevant to the FAQs you’ll be writing. For any useful note you find, **apply a tag called “FAQ”** while leaving it right where you found it.\\nOnce you’ve **found enough material to work with**, you can perform a single search—for the “FAQ” tag—and instantly see all the notes you’ve tagged collected in one place. Now you are free to review them more closely, highlight any specific points you want to use, and move those points into an outline to guide your writing.&quot;,536886133]],[&quot;^16&quot;,[1425,&quot;^P&quot;,&quot;^18&quot;,536886072]],[&quot;^16&quot;,[1425,&quot;^@&quot;,false,536886072]],[&quot;^16&quot;,[1425,&quot;^F&quot;,1424,536886072]],[&quot;^16&quot;,[1425,&quot;^Y&quot;,1405,536886072]],[&quot;^16&quot;,[1425,&quot;^V&quot;,1424,536886075]],[&quot;^16&quot;,[1425,&quot;^U&quot;,1405,536886133]],[&quot;^16&quot;,[1425,&quot;^?&quot;,[&quot;^ &quot;],536886133]],[&quot;^16&quot;,[1425,&quot;^19&quot;,true,536886072]],[&quot;^16&quot;,[1425,&quot;^;&quot;,&quot;~u62ba70c9-777c-426d-88c1-6fee4c2bd108&quot;,536886072]],[&quot;^16&quot;,[1426,&quot;^R&quot;,&quot;&gt; I **don’t recommend** using tags as your _primary organizational system_.&quot;,536886142]],[&quot;^16&quot;,[1426,&quot;^P&quot;,&quot;^18&quot;,536886111]],[&quot;^16&quot;,[1426,&quot;^@&quot;,false,536886111]],[&quot;^16&quot;,[1426,&quot;^F&quot;,1424,536886111]],[&quot;^16&quot;,[1426,&quot;^Y&quot;,1405,536886111]],[&quot;^16&quot;,[1426,&quot;^V&quot;,1405,536886111]],[&quot;^16&quot;,[1426,&quot;^U&quot;,1405,536886142]],[&quot;^16&quot;,[1426,&quot;^?&quot;,[&quot;^ &quot;],536886142]],[&quot;^16&quot;,[1426,&quot;^19&quot;,true,536886111]],[&quot;^16&quot;,[1426,&quot;^;&quot;,&quot;~u62ba71fe-103f-4fc9-9b83-9d74f8ad3f95&quot;,536886111]],[&quot;^16&quot;,[1427,&quot;^R&quot;,&quot;&quot;,536886114]],[&quot;^16&quot;,[1427,&quot;^P&quot;,&quot;^18&quot;,536886114]],[&quot;^16&quot;,[1427,&quot;^@&quot;,false,536886114]],[&quot;^16&quot;,[1427,&quot;^F&quot;,1425,536886114]],[&quot;^16&quot;,[1427,&quot;^Y&quot;,1405,536886114]],[&quot;^16&quot;,[1427,&quot;^V&quot;,1424,536886114]],[&quot;^16&quot;,[1427,&quot;^U&quot;,1405,536886114]],[&quot;^16&quot;,[1427,&quot;^?&quot;,[&quot;^ &quot;],536886114]],[&quot;^16&quot;,[1427,&quot;^19&quot;,true,536886114]],[&quot;^16&quot;,[1427,&quot;^;&quot;,&quot;~u62ba7240-cdea-45e4-9643-04820bed1e9d&quot;,536886114]],[&quot;^16&quot;,[1428,&quot;^R&quot;,&quot;&quot;,536886127]],[&quot;^16&quot;,[1428,&quot;^P&quot;,&quot;^18&quot;,536886127]],[&quot;^16&quot;,[1428,&quot;^@&quot;,false,536886127]],[&quot;^16&quot;,[1428,&quot;^F&quot;,1426,536886146]],[&quot;^16&quot;,[1428,&quot;^Y&quot;,1405,536886127]],[&quot;^16&quot;,[1428,&quot;^V&quot;,1405,536886127]],[&quot;^16&quot;,[1428,&quot;^?&quot;,[&quot;^ &quot;],536886127]],[&quot;^16&quot;,[1428,&quot;^19&quot;,true,536886127]],[&quot;^16&quot;,[1428,&quot;^;&quot;,&quot;~u62ba7249-b2e3-4714-bfc4-0e5dc1e1c80a&quot;,536886127]],[&quot;^16&quot;,[1429,&quot;^R&quot;,&quot;Compare to the ease of searching and browsing it takes far too much energy&quot;,536886173]],[&quot;^16&quot;,[1429,&quot;^P&quot;,&quot;^18&quot;,536886145]],[&quot;^16&quot;,[1429,&quot;^@&quot;,false,536886145]],[&quot;^16&quot;,[1429,&quot;^F&quot;,1426,536886145]],[&quot;^16&quot;,[1429,&quot;^Y&quot;,1405,536886145]],[&quot;^16&quot;,[1429,&quot;^V&quot;,1426,536886146]],[&quot;^16&quot;,[1429,&quot;^U&quot;,1405,536886173]],[&quot;^16&quot;,[1429,&quot;^?&quot;,[&quot;^ &quot;],536886173]],[&quot;^16&quot;,[1429,&quot;^19&quot;,true,536886145]],[&quot;^16&quot;,[1429,&quot;^;&quot;,&quot;~u62ba72e2-e550-44be-9ab7-d13e53a0a0ad&quot;,536886145]],[&quot;^16&quot;,[1430,&quot;^R&quot;,&quot;&gt; However, tags can come in handy in **specific situations** when ==the two previous retrieval methods aren’t up to the task==, and you want to spontaneously gather, connect, and synthesize groups of notes on the fly.&quot;,536886189]],[&quot;^16&quot;,[1430,&quot;^P&quot;,&quot;^18&quot;,536886176]],[&quot;^16&quot;,[1430,&quot;^@&quot;,false,536886176]],[&quot;^16&quot;,[1430,&quot;^F&quot;,1429,536886176]],[&quot;^16&quot;,[1430,&quot;^Y&quot;,1405,536886176]],[&quot;^16&quot;,[1430,&quot;^V&quot;,1426,536886176]],[&quot;^16&quot;,[1430,&quot;^U&quot;,1405,536886189]],[&quot;^16&quot;,[1430,&quot;^?&quot;,[&quot;^ &quot;],536886189]],[&quot;^16&quot;,[1430,&quot;^19&quot;,true,536886176]],[&quot;^16&
